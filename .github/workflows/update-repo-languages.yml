name: Update Repo Languages

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update repository language summary
        env:
          GITHUB_USERNAME: method404
          PROFILE_GH_TOKEN: ${{ secrets.PROFILE_GH_TOKEN }}
        run: python scripts/update_repo_languages.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/*.svg
          git commit -m "chore: update repo language summary"
          git push
